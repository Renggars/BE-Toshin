  /poin/:
    post:
      summary: Input Pelanggaran/Penghargaan (Hybrid NFC/Manual)
      description: |
        Mencatat pelanggaran atau penghargaan dengan **dua cara input**:
        1. **Via NFC**: Kirim `uid_nfc` untuk lookup operator otomatis
        2. **Via Manual**: Kirim `fk_id_operator` langsung (dari dropdown/form)
        
        **Validasi:**
        - Minimal salah satu dari `uid_nfc` atau `fk_id_operator` harus ada
        - Jika `uid_nfc` dikirim, sistem akan:
          - Mencari operator berdasarkan UID NFC
          - Validasi role harus `PRODUKSI`
          - Validasi status harus `active`
          - Cek apakah sedang suspend
        
        **Database:**
        - Yang tersimpan di database adalah `fk_id_operator` (ID user)
        - `uid_nfc` hanya digunakan untuk lookup
        
        **Side Effects:**
        - Update `current_point` di tabel `user`
        - Kirim email alert jika poin < 50 (SP1/SP2/SP3)
        - Hitung `status_level` otomatis (AMAN/TEGURAN/SP1/SP2/SP3)
      tags:
        - Poin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fk_tipe_disiplin, fk_id_shift]
              properties:
                uid_nfc:
                  type: string
                  description: UID NFC operator (untuk input via NFC reader)
                  example: "ABC123456"
                fk_id_operator:
                  type: integer
                  description: ID operator (untuk input manual via dropdown)
                  example: 13
                fk_tipe_disiplin:
                  type: integer
                  description: ID tipe pelanggaran/penghargaan
                  example: 1
                fk_id_shift:
                  type: integer
                  description: ID shift saat kejadian
                  example: 2
                keterangan:
                  type: string
                  nullable: true
                  description: Catatan tambahan (optional)
                  example: "Terlambat 15 menit"
            examples:
              viaNFC:
                summary: Input via NFC (Hardware/IoT)
                value:
                  uid_nfc: "ABC123456"
                  fk_tipe_disiplin: 1
                  fk_id_shift: 2
                  keterangan: "Tidak memakai helm"
              viaManual:
                summary: Input Manual (Web/Mobile)
                value:
                  fk_id_operator: 13
                  fk_tipe_disiplin: 1
                  fk_id_shift: 2
                  keterangan: "Terlambat 15 menit"
      responses:
        '201':
          description: Berhasil dicatat
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Pelanggaran berhasil dicatat"
                  operator:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 13
                      nama:
                        type: string
                        example: "Budi Santoso"
                      current_point:
                        type: integer
                        example: 85
                        description: Poin terbaru setelah dikurangi/ditambah
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      fk_id_operator:
                        type: integer
                        example: 13
                      fk_tipe_disiplin:
                        type: integer
                        example: 1
                      fk_id_shift:
                        type: integer
                        example: 2
                      poin_berubah:
                        type: integer
                        example: -15
                        description: Negatif untuk pelanggaran, positif untuk penghargaan
                      status_level:
                        type: string
                        enum: [AMAN, TEGURAN, SP1, SP2, SP3]
                        example: "AMAN"
                      tanggal:
                        type: string
                        format: date-time
                      keterangan:
                        type: string
                        example: "Terlambat 15 menit"
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  code:
                    type: integer
                    example: 400
              examples:
                missingBoth:
                  summary: Tidak ada uid_nfc atau fk_id_operator
                  value:
                    message: "Harus menyertakan uid_nfc atau fk_id_operator"
                    code: 400
                notProduksi:
                  summary: Target bukan operator produksi
                  value:
                    message: "Target bukan operator produksi"
                    code: 400
                suspended:
                  summary: Operator sedang suspend
                  value:
                    message: "Operator sedang dalam masa suspend"
                    code: 400
        '404':
          description: Operator tidak ditemukan
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Operator tidak ditemukan"
                  code:
                    type: integer
                    example: 404


