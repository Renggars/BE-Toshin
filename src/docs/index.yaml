                  type: integer
                  description: "Reference to Rencana Produksi (RPH)"
                no_kanagata:
                  type: string
                no_lot:
                  type: string
                qty_ok:
                  type: integer
                qty_ng_prev:
                  type: integer
                qty_ng_proses:
                  type: integer
                qty_rework:
                  type: integer
                logs:
                  type: array
                  items:
                    type: object
                    required: [waktu_start, waktu_end, durasi_menit, kode_jam_kerja, kategori_downtime]
