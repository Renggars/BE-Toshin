  /lrp-dashboard/{lrpId}:
    get:
      summary: Get LRP Detail
      description: Get detailed LRP information including logs and summary
      tags: [LRP Dashboard]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: lrpId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  data:
                    type: object
                    properties:
                      header:
                        type: object
                        description: LRP Header info (Machine, Shift, User, Qty)
                      logs:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: integer }
                            waktu_start: { type: string, format: date-time }
                            waktu_end: { type: string, format: date-time }
                            durasi_menit: { type: number }
                            kategori_downtime: { type: string }
                            keterangan: { type: string }
                      summary_waktu:
                        type: object
                        properties:
                          runtime: { type: number }
                          breakdown: { type: number }
                          plan_downtime: { type: number }
        '404':
          description: LRP not found

    patch:
      summary: Update LRP (Supervisor/Admin)
      description: Update LRP quantities or status
      tags: [LRP Dashboard]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: lrpId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                qty_ok:
                  type: integer
                  minimum: 0
                qty_ng_proses:
                  type: integer
                  minimum: 0
                qty_ng_prev:
                  type: integer
                  minimum: 0
                qty_rework:
                  type: integer
                  minimum: 0
                status_lrp:
                  type: string
                  enum: [SUBMITTED, VERIFIED]
      responses:
        '200':
          description: LRP updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
        '404':
          description: LRP not found

    delete:
      summary: Delete LRP (Supervisor/Admin)
      description: Delete LRP and re-sync OEE
      tags: [LRP Dashboard]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: lrpId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: LRP deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  message:
                    type: string
        '404':
          description: LRP not found

