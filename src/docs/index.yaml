                        type: string
                        enum: [A, D, B1, B2, B3, B4, C]
                      kategori_downtime:
                        type: string
                        enum: [PLAN_DOWNTIME, RUNTIME, BREAKDOWN]
                      keterangan:
                        type: string
      responses:
        '201':
          description: LRP Created Successfully
    
