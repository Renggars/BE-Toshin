openapi: 3.0.0
info:
  title: Toshin Production Management API
  version: 1.7.0
  description: API Backend untuk Sistem Manajemen Produksi Toshin - Attendance, Production Planning, dan Discipline Points Management
  contact:
    name: Rengga Rendi Saputra
    email: renggarendy22@gmail.com

servers:
  - url: http://localhost:4001
    description: Development Server
  - url: https://lesli-thorny-bunny.ngrok-free.dev/
    description: Production Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT token untuk autentikasi. Format: Bearer {token}"

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer
        stack:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        nama:
          type: string
        email:
          type: string
        uid_nfc:
          type: string
        foto_profile:
          type: string
          nullable: true
        role:
          type: string
          enum: [PRODUKSI, SUPERVISOR, ENGINEERING, MAINTENANCE]
        plant:
          type: string
        line:
          type: string
        current_point:
          type: integer
        status:
          type: string
        fk_id_divisi:
          type: integer
        divisi:
          type: object
          properties:
            id:
              type: integer
            nama_divisi:
              type: string

    TipeDisiplin:
      type: object
      properties:
        id:
          type: integer
        kode:
          type: string
        nama_tipe_disiplin:
          type: string
        poin:
          type: integer
        kategori:
          type: string
          enum: [PELANGGARAN, PENGHARGAAN]

    Divisi:
      type: object
      properties:
        id:
          type: integer
        nama_divisi:
          type: string

    AndonEventCompact:
       type: object
       properties:
         id: { type: integer }
         mesin: { type: string }
         masalah: { type: string }
         kategori: { type: string }
         waktu_trigger: { type: string, format: date-time }
         waktu_resolved: { type: string, format: date-time, nullable: true }
         durasi: { type: number }
         status: { type: string, enum: [ACTIVE, IN_REPAIR, RESOLVED] }

    AndonCall:
      type: object
      properties:
        id: { type: integer }
        fk_id_mesin: { type: integer }
        fk_id_operator: { type: integer }
        fk_id_shift: { type: integer, nullable: true }
        fk_id_target_divisi: { type: integer }
        target_divisi: { type: string, enum: [MAINTENANCE, QUALITY, PRODUKSI, DIE_MAINT] }
        waktu_call: { type: string, format: date-time }
        status: { type: string, enum: [WAITING, CONVERTED, CANCELLED] }
        tanggal: { type: string, format: date }
        plant: { type: string, nullable: true }

    AndonEvent:
      type: object
      properties:
        id: { type: integer }
        fk_id_mesin: { type: integer }
        fk_id_operator: { type: integer }
        fk_id_shift: { type: integer, nullable: true }
        fk_id_masalah: { type: integer }
        waktu_trigger: { type: string, format: date-time }
        waktu_start_perbaikan: { type: string, format: date-time, nullable: true }
        waktu_resolved: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [ACTIVE, IN_REPAIR, RESOLVED] }
        catatan: { type: string, nullable: true }
        durasi_downtime: { type: number, nullable: true }
        mesin:
          type: object
          properties:
            nama_mesin: { type: string }
        masalah:
          type: object
          properties:
            nama_masalah: { type: string }
            kategori: { type: string }
            waktu_perbaikan_menit: { type: integer }
        operator:
          type: object
          properties:
            nama: { type: string }
        shift:
          type: object
          properties:
            nama_shift: { type: string }

    JenisPekerjaan:
      type: object
      properties:
        id:
          type: integer
        nama_pekerjaan:
          type: string

    Notification:
      type: object
      properties:
        id:
          type: integer
          example: 1
        fk_id_user:
          type: integer
          example: 3
        tipe:
          type: string
          enum: [RPH_ASSIGNED, ANDON_CALL, ANDON_RESOLVED]
          example: RPH_ASSIGNED
        judul:
          type: string
          example: "RPH Baru Ditugaskan"
        pesan:
          type: string
          example: "Anda ditugaskan RPH baru: mesin FB1100A, produk Part A, tanggal 2026-02-16"
        is_read:
          type: boolean
          example: false
        data_json:
          type: string
          nullable: true
          example: '{"rphId": 1}'
        created_at:
          type: string
          format: date-time

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication endpoints (Login & Register)
  - name: User
    description: User management endpoints
  - name: Poin
    description: Discipline points management
  - name: Rencana Produksi
    description: Production planning endpoints
  - name: Master
    description: Master data endpoints (Mesin, Produk, Shift, Target)
  - name: Divisi
    description: Division management endpoints (CRUD operations)
  - name: Jenis Pekerjaan
    description: Jenis Pekerjaan management endpoints (CRUD operations)
  - name: Andon
    description: |
      Real-time Andon system endpoints with WebSocket events.
      
      **WebSocket Events Emitted:**
      - `andon-created` - Saat Andon di-trigger
      - `andon-resolved` - Saat Andon di-resolve
      - `andon-summary-updated` - Update dashboard summary
      - `andon-metric-changed` - Update metrics (avg downtime)
      
      **Legacy Events (Backward Compatible):**
      - `update-monitor` - Generic Andon updates
      - `andon-dashboard-updated` - Dashboard refresh signal
  - name: OEE
    description: Overall Equipment Effectiveness endpoints (Socket.io event 'oee-updated')
  - name: Produksi
    description: Production logging endpoints
  - name: LRP
    description: Laporan Realisasi Produksi (LRP) endpoints
  - name: Attendance
    description: Attendance management endpoints
  - name: LRP Dashboard
    description: Reporting endpoints for LRP (Supervisor/Admin)
  - name: Notification
    description: |
      Real-time notification system endpoints.
      
      **Notification Types:**
      - `RPH_ASSIGNED` - Saat user di-assign RPH baru
      - `ANDON_CALL` - Saat operator menekan Andon
      - `ANDON_RESOLVED` - Saat Andon diselesaikan
      
      **WebSocket Event:** `notification` - Dikirim ke room `user:<userId>` secara real-time

paths:
  /auth/register:
    post:
      summary: Register New User
      description: |
        Register a new user account with email and password.
        - Email and password are required
        - uid_nfc is not required during registration (will be added separately)
        - Returns user data without password
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nama, email, password, fk_id_divisi, role, plant, line]
              properties:
                nama:
                  type: string
                  example: "John Doe"
                email:
                  type: string
                  format: email
                  example: "john.doe@example.com"
                password:
                  type: string
                  format: password
                  example: "Password123!"
                  description: "Minimum 8 characters, must contain at least one letter and one number"
                fk_id_divisi:
                  type: integer
                  example: 1
                role:
                  type: string
                  enum: [PRODUKSI, QUALITY, MAINTENANCE, DIE_MAINT, ENGINEERING, MARKETING, COMMERCIAL, PPIC, HCPGA, WRH_CIBITUNG, GA, WAREHOUSE, PURCHASING, HC, ACCOUNTING, FINANCE, SUPERVISOR, ADMIN]
                  example: "PRODUKSI"
                foto_profile:
                  type: string
                  format: uri
                  nullable: true
                  example: "https://example.com/profile.jpg"
                plant:
                  type: string
                  enum: ["1", "2", "3"]
                  example: "1"
                line:
                  type: string
                  example: "Line A"
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Registrasi berhasil"
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          description: Bad request - Email already registered or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      summary: User Login
      description: |
        Login with either NFC card or email/password combination.
        - NFC Login: Provide uid_nfc only
        - Email Login: Provide email and password
        - Returns user data, JWT tokens, and dashboard data (for PRODUKSI role)
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [uid_nfc]
                  properties:
                    uid_nfc:
                      type: string
                      example: "ABC123DEF456"
                - type: object
                  required: [email, password]
                  properties:
                    email:
                      type: string
                      format: email
                      example: "john.doe@example.com"
                    password:
                      type: string
                      format: password
                      example: "Password123!"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login success"
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      tokens:
                        type: object
                        properties:
                          access:
                            type: object
                            properties:
                              token:
                                type: string
                              expires:
                                type: string
                                format: date-time
                          refresh:
                            type: object
                            properties:
                              token:
                                type: string
                              expires:
                                type: string
                                format: date-time
                      dashboard:
                        type: object
                        nullable: true
                        description: "Dashboard data for PRODUKSI role only"
        '401':
          description: Unauthorized - Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Account suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /andon/trigger:
    post:
      summary: Trigger Andon (Smart RPH-Based - PLAN_DOWNTIME only)
      description: |
        Trigger Andon event directly. 
        **IMPORTANT:** This endpoint only allows `PLAN_DOWNTIME` category.
        For other categories (BREAKDOWN, etc.), use `POST /andon/call`.
      tags: [Andon]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fk_id_mesin, fk_id_masalah]
              properties:
                fk_id_mesin: { type: integer, example: 1 }
                fk_id_masalah: { type: integer, example: 1 }
                fk_id_operator: { type: integer, nullable: true }
      responses:
        '201':
          description: Andon triggered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  message: { type: string, example: "Success trigger andon" }
                  data: { $ref: '#/components/schemas/AndonEvent' }
        '400':
          description: Bad Request - Category must be PLAN_DOWNTIME or missing call flow

  /andon/call:
    post:
      summary: Call Maintenance/Andon (New Flow)
      description: |
        Production operator calls for help. This creates an `AndonCall` record with status `WAITING`.
        No `AndonEvent` is created at this stage.
      tags: [Andon]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fk_id_mesin, target_divisi]
              properties:
                fk_id_mesin: { type: integer, example: 1 }
                target_divisi:
                  type: string
                  enum: [MAINTENANCE, QUALITY, PRODUKSI, DIE_MAINT]
                  example: MAINTENANCE
      responses:
        '201':
          description: Call created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  message: { type: string, example: "Success call andon" }
                  data: { $ref: '#/components/schemas/AndonCall' }

  /andon/{id}/start-repair:
    patch:
      summary: Start Andon Repair / Convert Call to Event
      description: |
        Maintenance arrives and starts repair.
        - If `id` is an **AndonCall ID**: Converts the call into an `AndonEvent` (status: ACTIVE) and updates call status to `CONVERTED`.
        - If `id` is an **AndonEvent ID**: Used for `PLAN_DOWNTIME` flow to change status from ACTIVE to IN_REPAIR.
      tags: [Andon]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fk_id_masalah: { type: integer, description: "Optionally update the problem type" }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  message: { type: string, example: "Success start repair andon" }
                  data: { $ref: '#/components/schemas/AndonEvent' }

  /andon/{id}/resolve:
    patch:
      summary: Resolve Andon
      description: |
        Complete the Andon repair.
        - Plan Downtime: Can resolve directly from ACTIVE.
        - Others: Must be IN_REPAIR before resolving.
        - Calculates total downtime and maintenance wait time.
      tags: [Andon]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  message: { type: string, example: "Success resolve andon" }
                  data:
                    type: object
                    properties:
                      andon_event: { $ref: '#/components/schemas/AndonEvent' }
                      durasi_downtime: { type: number }
                      affected_shift: { type: array, items: { type: object } }

  /andon/active:
    get:
      summary: Get Active Andon Events
      description: |
        Mengambil daftar semua Andon yang statusnya sedang **ACTIVE**.
        Digunakan untuk monitoring real-time dan sinkronisasi awal saat dashboard dibuka.
      tags: [Andon]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Success get active andon
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 13
                        fk_id_mesin:
                          type: integer
                          example: 1
                        status:
                          type: string
                          example: ACTIVE
                        waktu_trigger:
                          type: string
                          format: date-time
                        mesin:
                          type: object
                          properties:
                            nama_mesin:
                              type: string
                              example: CNC-01
                        masalah:
                          type: object
                          properties:
                            nama_masalah:
                              type: string
                              example: Motor Rusak
                            kategori:
                              type: string
                              example: BREAKDOWN
                            waktu_perbaikan_menit:
                              type: integer
                              example: 30
                        operator:
                          type: object
                          properties:
                            nama:
                              type: string
                              example: Operator 1
                        shift:
                          type: object
                          properties:
                            nama_shift:
                              type: string
                              example: Shift 1

  /andon/shift:
    get:
      summary: Get Active Andon Events (Compact)
      description: |
        Alias untuk /andon/active, mengembalikan daftar semua Andon yang statusnya sedang **ACTIVE**.
      tags: [Andon]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Success get active andon
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        status: { type: string, example: ACTIVE }
                        waktu_trigger: { type: string, format: date-time }
                        mesin:
                          type: object
                          properties:
                            nama_mesin: { type: string }

  /andon/dashboard:
    get:
      summary: Get Unified Andon Dashboard Data
      description: |
        Endpoint tunggal untuk semua kebutuhan dashboard Andon.
        Mengembalikan summary, status per plant, active events, dan history dalam satu request.
        
        **Features:**
        - Summary statistics (total active, resolved today, avg downtime, machines affected)
        - Active events per plant
        - Real-time active events dengan elapsed time
        - Paginated history dengan filter dinamis (date/shift/plant/mesin/status)
        
        **Default Values:**
        - plantId: "3" (Plant 3)
        - date: "Today's date" (WIB)
        - page: 1
        - limit: 20
        
        **Dynamic Filters:**
        - Menggunakan kolom `tanggal` (exact date) untuk filtering yang lebih cepat.
        - History table menampilkan ACTIVE dan RESOLVED berdasarkan filter "status"
        - Gunakan "status=Semua Status" atau kosongkan untuk menampilkan semua status
        - Gunakan "mesinId=Semua Mesin" atau kosongkan untuk menampilkan semua mesin
        
        **Optimization:** Gunakan parameter `onlyHistory=true` untuk pagination history tanpa re-fetch summary/active data.
        
        **Timezone:** Semua operasi waktu menggunakan WIB (Asia/Jakarta)
      tags: [Andon]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: date
          schema: { type: string, format: date }
          description: Filter by operational date (YYYY-MM-DD). Default today WIB.
        - in: query
          name: shiftId
          schema: { type: integer }
          description: Filter by shift ID
        - in: query
          name: plantId
          schema: { type: string, default: "3" }
          example: "3"
          description: Filter by plant ID/name. Default "3". Menggunakan field denormalized `plant`.
        - in: query
          name: mesinId
          schema: { type: integer }
          description: Filter by machine ID. Use "Semua Mesin" or omit for all machines
        - in: query
          name: status
          schema: { type: string, enum: [ACTIVE, RESOLVED, "Semua Status"] }
          description: Filter history by status. Use "Semua Status" or omit for all statuses
        - in: query
          name: page
          schema: { type: integer, default: 1 }
          description: Page number for history pagination
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
          description: Items per page (max 100)
        - in: query
          name: onlyHistory
          schema: { type: boolean }
          description: "Optimization: Set true to only fetch history (summary/plants/activeEvents will be null)"
        - in: query
          name: kategori
          schema: { type: string, default: "Semua Kategori" }
          description: "Filter by problem category (MAINTENANCE, QUALITY_CONTROL, DIE_MAINTENANCE, PRODUCTION, PLAN_DOWNTIME). Default Semua Kategori."
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                summary:
                  totalActive: 1
                  resolvedToday: 12
                  avgDowntime: 18
                  totalMesinBermasalah: 1
                plants:
                  - id: 1
                    name: "Plant 1"
                    activeCount: 1
                  - id: 2
                    name: "Plant 2"
                    activeCount: 0
                  - id: 3
                    name: "Plant 3"
                    activeCount: 0
                activeEvents:
                  - id: 550
                    status: "ACTIVE"
                    waktu_trigger: "2026-02-04T10:30:00.000Z"
                    elapsed_minutes: 5.5
                    live_sla_status: "ON_TIME"
                    estimasi_menit: 30
                    mesin:
                      id: 1
                      nama_mesin: "CNC-01"
                    masalah:
                      nama_masalah: "Motor Rusak"
                      kategori: "BREAKDOWN"
                    operator:
                      nama: "Budi"
                    shift:
                      nama_shift: "Shift 1"
                history:
                  data:
                    - id: 549
                      tanggal: "2026-02-04T09:00:00.000Z"
                      mesin: "CNC-02"
                      plant: "Plant 1"
                      shift: "Shift 1"
                      masalah: "Sensor Error"
                      kategori: "ELECTRICAL"
                      operator: "Andi"
                      resolver: "Supervisor"
                      downtime: 15.25
                      status: "RESOLVED"
                      respon_status: "ON_TIME"
                      estimasi_menit: 20
                      waktu_resolved: "2026-02-04T09:15:00.000Z"
                  meta:
                    totalItems: 1
                    totalPages: 1
                    currentPage: 1
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    nullable: true
                    description: "Null if onlyHistory=true"
                    properties:
                      totalActive: { type: integer, description: "Jumlah event ACTIVE saat ini" }
                      resolvedToday: { type: integer, description: "Jumlah event resolved pada tanggal terpilih" }
                      avgDowntime: { type: number, description: "Rata-rata downtime dalam menit" }
                      totalMesinBermasalah: { type: integer, description: "Jumlah unique mesin dengan status ACTIVE" }
                  plants:
                    type: array
                    nullable: true
                    description: "Status active events per plant. Null if onlyHistory=true"
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
                        activeCount: { type: integer }
                  activeEvents:
                    type: array
                    nullable: true
                    description: "List event yang sedang ACTIVE. Null if onlyHistory=true"
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        status: { type: string }
                        waktu_trigger: { type: string, format: date-time }
                        elapsed_minutes: { type: number, description: "Durasi sejak trigger (menit)" }
                        live_sla_status: { type: string, enum: [ON_TIME, OVER_TIME], description: "Status SLA real-time" }
                        estimasi_menit: { type: integer, description: "Estimasi waktu perbaikan (menit)" }
                        mesin:
                          type: object
                          properties:
                            id: { type: integer }
                            nama_mesin: { type: string }
                        masalah:
                          type: object
                          properties:
                            nama_masalah: { type: string }
                            kategori: { type: string }
                        operator:
                          type: object
                          properties:
                            nama: { type: string }
                        shift:
                          type: object
                          properties:
                            nama_shift: { type: string }
                  history:
                    type: object
                    description: "History events (RESOLVED & ACTIVE based on status filter)"
                    properties:
                      data:
                        type: array
                        description: "Flattened history events for UI table"
                        items:
                          type: object
                          properties:
                            id: { type: integer }
                            tanggal: { type: string, format: date-time }
                            mesin: { type: string }
                            plant: { type: string }
                            shift: { type: string }
                            masalah: { type: string }
                            kategori: { type: string }
                            operator: { type: string }
                            resolver: { type: string }
                            downtime: { type: number, description: "Durasi dalam menit" }
                            status: { type: string }
                            respon_status: { type: string, enum: [ON_TIME, OVER_TIME], description: "Status ketepatan waktu perbaikan" }
                            estimasi_menit: { type: integer, description: "Estimasi waktu perbaikan (menit)" }
                            waktu_resolved: { type: string, format: date-time, nullable: true }
                      meta:
                        type: object
                        properties:
                          totalItems: { type: integer }
                          totalPages: { type: integer }
                          currentPage: { type: integer }

  /andon/filters:
    get:
      summary: Get Master Data for Andon Filters
      description: |
        Mengambil data master (Shift & Kategori Andon) untuk mengisi dropdown filter di dashboard.
        Endpoint ini dioptimalkan karena data ini jarang berubah.
