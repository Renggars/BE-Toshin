  /rencana-produksi/dashboard/summary:
    get:
      summary: Get Production Dashboard Summary
      description: |
        Mengambil ringkasan dashboard produksi harian dengan data aktual dari LRP (Laporan Realisasi Produksi).
        
        **Features:**
        - Summary produksi harian (target, tercapai, persentase)
        - Statistik operator (total, aktif)
        - Progress per shift dengan data aktual
        - Trend produksi mingguan (7 hari ke belakang)
        
        **Data Source:**
        - Target: Dari `rencana_produksi.target`
        - Tercapai: Dari `laporan_realisasi_produksi.qty_total_prod` (data aktual)
        
        **Default Behavior:**
        - Tanggal filter default: Hari ini
        - Trend mingguan: 7 hari dari tanggal filter ke belakang
      tags:
        - Rencana Produksi
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: tanggal
          schema:
            type: string
            format: date
          description: Filter tanggal (YYYY-MM-DD). Default adalah hari ini.
          example: "2026-02-10"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    description: Ringkasan produksi harian
                    properties:
                      target_harian:
                        type: integer
                        description: Total target produksi harian
                        example: 3700
                      tercapai:
                        type: integer
                        description: Total produksi tercapai (dari LRP qty_total_prod)
                        example: 1195
                      persentase:
                        type: number
                        description: Persentase pencapaian (tercapai/target * 100)
                        example: 32.3
                  operator:
                    type: object
                    description: Statistik operator
                    properties:
                      total:
                        type: integer
                        description: Total operator produksi
                        example: 160
                      aktif:
                        type: integer
                        description: Jumlah operator yang hadir (tap attendance)
                        example: 2
                      label:
                        type: string
                        description: Label untuk UI
                        example: "2 operator"
                  shift_details:
                    type: array
                    description: Detail progress per shift dengan data aktual LRP
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: ID shift
                          example: 1
                        nama:
                          type: string
                          description: Nama shift
                          example: "Shift 1"
                        jam:
                          type: string
                          description: Jam kerja shift
                          example: "07:30 - 15:30"
                        target:
                          type: integer
                          description: Target produksi shift
                          example: 2450
                        tercapai:
                          type: integer
                          description: Produksi tercapai shift (dari LRP qty_total_prod)
                          example: 420
                        persentase:
                          type: number
                          description: Persentase pencapaian shift
                          example: 17.1
                  trend_produksi_mingguan:
                    type: array
                    description: Data trend produksi 7 hari ke belakang dari tanggal filter
                    items:
                      type: object
                      properties:
                        tanggal:
                          type: string
                          format: date
                          description: Tanggal produksi
                          example: "2026-02-04"
                        target:
                          type: integer
                          description: Total target hari tersebut
                          example: 3500
                        tercapai:
                          type: integer
                          description: Total tercapai dari LRP qty_total_prod
                          example: 1120
              example:
                summary:
                  target_harian: 3700
                  tercapai: 1195
                  persentase: 32.3
                operator:
                  total: 160
                  aktif: 2
                  label: "2 operator"
                shift_details:
                  - id: 1
                    nama: "Shift 1"
                    jam: "07:30 - 15:30"
                    target: 2450
                    tercapai: 420
                    persentase: 17.1
                  - id: 2
                    nama: "Shift 2"
                    jam: "15:30 - 23:30"
                    target: 0
                    tercapai: 465
                    persentase: 0
                  - id: 3
                    nama: "Shift 3"
                    jam: "23:30 - 07:30"
                    target: 0
                    tercapai: 310
                    persentase: 0
                trend_produksi_mingguan:
                  - tanggal: "2026-02-04"
                    target: 3500
                    tercapai: 1120
                  - tanggal: "2026-02-05"
                    target: 3700
                    tercapai: 1184
                  - tanggal: "2026-02-06"
                    target: 3600
                    tercapai: 1152
                  - tanggal: "2026-02-07"
                    target: 3800
                    tercapai: 1216
                  - tanggal: "2026-02-08"
                    target: 3700
                    tercapai: 1184
                  - tanggal: "2026-02-09"
                    target: 3650
                    tercapai: 1168
                  - tanggal: "2026-02-10"
                    target: 3700
                    tercapai: 1195

