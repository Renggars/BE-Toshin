  /andon/history:
    get:
      summary: Get Personal History Andon (Today)
      description: |
        Mengambil history downtime operator untuk **HARI INI SAJA**.
        
        **Authentication Required:** Endpoint ini menggunakan ID user dari token JWT yang terautentikasi.
        
        **New Logic (Static Shift Duration):**
        - **Normal / Group**: Total Shift = 420 menit (7 jam)
        - **Long Shift**: Total Shift = 600 menit (10 jam)
        
        **Limits:**
        - **Plan Downtime**: Max 10% dari durasi shift
        - **Breakdown**: Max 15% dari durasi shift
        
        Response memisahkan `plan_downtime` dan `breakdown_downtime` beserta statusnya (AMAN / OVER_LIMIT).
      tags: [Andon]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean }
                  message: { type: string, example: "Success get personal history" }
                  data:
                    type: object
                    properties:
                      summary:
                        type: object
                        properties:
                          date: { type: string, example: "2026-02-12" }
                          effective_shift_minutes: { type: number, example: 450 }
                          total_downtime: { type: number, example: 80 }
                          total_percentage: { type: number, example: 17.7 }
                          plan_downtime:
                            type: object
                            properties:
                              total: { type: number, example: 50 }
                              limit: { type: number, example: 45 }
                              percentage_of_shift: { type: number, example: 11.1 }
                              percentage_of_limit: { type: number, example: 111 }
                          breakdown_downtime:
                            type: object
                            properties:
                              total: { type: number, example: 30 }
                              limit: { type: number, example: 67.5 }
                              percentage_of_shift: { type: number, example: 6.6 }
                              percentage_of_limit: { type: number, example: 44 }
                      history:
                        type: object
                        properties:
                          plan_downtime:
                            type: array
                            items:
                              $ref: '#/components/schemas/AndonEventCompact'
                          breakdown:
                            type: array
                            items:
                              $ref: '#/components/schemas/AndonEventCompact'



