services:
  app:
    build: .
    container_name: toshin-app
    restart: always
    mem_limit: 1024m
    init: true
    ports:
      - "${PORT:-4001}:4001"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-4001}
      - TCP_PORT=${TCP_PORT:-4210}
      - DATABASE_URL=${DATABASE_URL:-mysql://root:rootpassword123@mysql:3306/toshin}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-yourpassword123}@redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-yourpassword123}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - JWT_SECRET=${JWT_SECRET:-changeme_please_use_strong_secret}
      - JWT_ACCESS_EXPIRATION_MINUTES=${JWT_ACCESS_EXPIRATION_MINUTES:-1440}
      - JWT_REFRESH_EXPIRATION_DAYS=${JWT_REFRESH_EXPIRATION_DAYS:-7}
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASS=${EMAIL_PASS:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - exports_data:/app/public/exports
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.0
    container_name: toshin-mysql
    restart: always
    mem_limit: 1536m
    command: --lower-case-table-names=1
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpassword123}
      - MYSQL_DATABASE=${DB_NAME:-toshin}
    # Port MySQL hanya dibuka saat development lokal.
    # Di VPS/production: comment ports berikut agar tidak exposed ke publik.
    ports:
      - "${DB_PORT_EXTERNAL:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: toshin-redis
    restart: always
    mem_limit: 256m
    command: redis-server --requirepass ${REDIS_PASSWORD:-yourpassword123}
    # Port Redis hanya dibuka saat development lokal.
    # Di VPS/production: comment ports berikut agar tidak exposed ke publik.
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-yourpassword123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: toshin-phpmyadmin
    restart: always
    mem_limit: 128m
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mysql
      - PMA_PORT=3306
    ports:
      - "${PMA_PORT_EXTERNAL:-8081}:80"
    depends_on:
      mysql:
        condition: service_healthy

  redis-insight:
    image: redis/redisinsight:latest
    container_name: toshin-redis-insight
    restart: always
    mem_limit: 512m
    ports:
      - "${REDIS_INSIGHT_PORT:-8001}:8001"
    depends_on:
      redis:
        condition: service_healthy

  node-exporter:
    image: prom/node-exporter:latest
    container_name: toshin-node-exporter
    restart: always
    mem_limit: 128m
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  prometheus:
    image: prom/prometheus:latest
    container_name: toshin-prometheus
    restart: always
    mem_limit: 512m
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/console_templates'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    depends_on:
      - node-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: toshin-grafana
    restart: always
    mem_limit: 512m
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  nginx:
    image: nginx:latest
    container_name: toshin-nginx
    restart: always
    mem_limit: 128m
    ports:
      - "80:80"
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - phpmyadmin

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: toshin-redis-exporter
    restart: always
    mem_limit: 128m
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-yourpassword123}
    depends_on:
      - redis

volumes:
  mysql_data:
  redis_data:
  exports_data:
  uploads_data:
  prometheus_data:
  grafana_data:
